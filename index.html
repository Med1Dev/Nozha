<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatherGo - Ultra Modern Cloud Outing Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-main: #0b0f19;
            --card-bg: rgba(20, 26, 44, 0.65);
            --neon-primary: #00f2fe;
            --neon-secondary: #4facfe;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --border-neon: rgba(0, 242, 254, 0.2);
            --font-en: 'Plus Jakarta Sans', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-en);
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 242, 254, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 172, 254, 0.1) 0px, transparent 50%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body.rtl {
            font-family: var(--font-ar);
            direction: rtl;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            max-width: 650px;
            margin-bottom: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-neon);
            color: var(--text-light);
            padding: 10px 24px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .lang-btn:hover {
            background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary));
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
            border-color: transparent;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-neon);
            max-width: 650px;
            width: 100%;
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        body.rtl .form-group {
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--neon-primary);
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-light);
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--neon-primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary));
            color: #0b0f19;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.25);
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 242, 254, 0.45);
        }

        .admin-gateway {
            margin-top: 40px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            text-align: center;
        }

        .gateway-trigger {
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            text-decoration: underline;
        }

        .gateway-trigger:hover {
            color: var(--neon-primary);
        }

        .admin-zone {
            display: none;
            margin-top: 25px;
        }

        .auth-box {
            display: flex;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-sm {
            width: auto;
            padding: 0 25px;
        }

        .table-view-container {
            background: #141a2c;
            border: 1px solid var(--neon-primary);
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            color: #f3f4f6;
        }

        body.rtl table {
            text-align: right;
        }

        th, td {
            padding: 16px 20px;
            font-size: 1rem;
        }

        th {
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            font-weight: 700;
            border-bottom: 2px solid #00f2fe;
        }

        td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4a4a;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .delete-btn:hover {
            background: rgba(255, 74, 74, 0.2);
            color: #ff6b6b;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">العربية</button>
    </div>

    <div class="main-card">
        <header>
            <h1 id="mainTitle">GatherGo</h1>
            <p id="mainDesc">Effortless coordination for premium outings & picnics</p>
        </header>

        <form id="outingForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label id="lblName" for="userName">Full Name</label>
                <input type="text" id="userName" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label id="lblItem" for="userItem">What are you bringing?</label>
                <input type="text" id="userItem" required placeholder="e.g., Chocolate cake, fresh juice...">
            </div>
            <button type="submit" class="btn" id="btnSubmit">Confirm Attendance</button>
        </form>

        <div class="admin-gateway">
            <button class="gateway-trigger" id="btnAdminShow" onclick="toggleAdminView()">🔒 Manage Outing List (Admin)</button>
            
            <div class="admin-zone" id="adminZone">
                <div class="auth-box" id="authBox">
                    <input type="password" id="adminPassword" placeholder="Enter Admin Passcode">
                    <button class="btn btn-sm" id="btnVerify" onclick="verifyAdmin()">Unlock</button>
                </div>

                <div id="secureContent" style="display: none;">
                    <div class="table-view-container">
                        <table>
                            <thead>
                                <tr>
                                    <th id="thName">Participant Name</th>
                                    <th id="thItem">Item to Bring</th>
                                    <th style="width: 60px; text-align: center;">✕</th>
                                </tr>
                            </thead>
                            <tbody id="listBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ استبدل هذا الكائن ببيانات مشروعك الخاصة من Firebase ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyCx4ALN3OgXm0Hs1R9OoSAC7aHPX8Yf0T4",
            authDomain: "nozha-a61d1.firebaseapp.com",
            databaseURL: "https://nozha-a61d1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "nozha-a61d1",
            storageBucket: "nozha-a61d1.firebasestorage.app",
            messagingSenderId: "490756946423",
            appId: "1:490756946423:web:311aa1863066e9155716f2",
            measurementId: "G-PLLHLWWHPK"
        };

        // تشغيل ربط الـ Firebase السحابي
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listRef = database.ref('outingList'); // المسار السحابي لحفظ اللائحة

        let currentLang = 'en';
        const adminPIN = "1234"; // رمز الأدمن الخاص بك لدخول القائمة

        const langData = {
            en: {
                title: "GatherGo",
                desc: "Effortless coordination for premium outings & picnics",
                lblName: "Full Name",
                lblItem: "What are you bringing?",
                placeholderName: "Enter your name",
                placeholderItem: "e.g., Chocolate cake, fresh juice...",
                btnSubmit: "Confirm Attendance",
                btnAdminShow: "🔒 Manage Outing List (Admin)",
                btnAdminHide: "Close Admin Management",
                pinPlaceholder: "Enter Admin Passcode",
                btnVerify: "Unlock",
                thName: "Participant Name",
                thItem: "Item to Bring",
                alertSuccess: "Success! You have been added to the list.",
                alertWrongPin: "Access Denied. Invalid Admin Passcode.",
                langBtn: "العربية"
            },
            ar: {
                title: "جاذر جو | GatherGo",
                desc: "تنسيق متكامل ونخبة لتنظيم النزهات والرحلات الجماعية",
                lblName: "الاسم الكامل",
                lblItem: "ماذا ستحضر معك؟",
                placeholderName: "أدخل اسمك هنا",
                placeholderItem: "مثال: كعكة الشوكولاتة، عصائر طازجة...",
                btnSubmit: "تأكيد الحضور والانضمام",
                btnAdminShow: "🔒 إدارة القائمة (خاص بالآدمن)",
                btnAdminHide: "إغلاق لوحة الإدارة",
                pinPlaceholder: "أدخل الرقم السري للآدمن",
                btnVerify: "تحقق وفتح",
                thName: "اسم المشارك",
                thItem: "الغرض المراد إحضاره",
                alertSuccess: "تم تسجيل حضورك وإضافتك إلى اللائحة بنجاح!",
                alertWrongPin: "رمز الدخول خاطئ. تم رفض صلاحية الآدمن.",
                langBtn: "English"
            }
        };

        // دالة إرسال البيانات إلى السحاب مباشرة بدلاً من جهازك
        function handleSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const item = document.getElementById('userItem').value.trim();

            if(name && item) {
                // دفع البيانات للسيرفر السحابي لكي يراها الجميع فوراً
                listRef.push({ name, item })
                .then(() => {
                    alert(langData[currentLang].alertSuccess);
                    document.getElementById('outingForm').reset();
                });
            }
        }

        // الاستماع المباشر للتغييرات السحابية (Realtime تحديث تلقائي بدون ريفريش)
        listRef.on('value', (snapshot) => {
            const tbody = document.getElementById('listBody');
            tbody.innerHTML = '';
            const data = snapshot.val();
            
            if (data) {
                // فك تشفير البيانات القادمة من السيرفر وعرضها بالجدول
                Object.keys(data).forEach((key) => {
                    tbody.innerHTML += `<tr>
                        <td>${data[key].name}</td>
                        <td>${data[key].item}</td>
                        <td style="text-align: center;">
                            <button class="delete-btn" onclick="deleteItem('${key}')">✕</button>
                        </td>
                    </tr>`;
                });
            }
        });

        // دالة الحذف من السحاب مباشرة
        function deleteItem(key) {
            if(confirm(currentLang === 'ar' ? 'هل أنت متأكد من حذف هذا المشارك؟' : 'Are you sure you want to delete this participant?')) {
                database.ref('outingList/' + key).remove();
            }
        }

        function verifyAdmin() {
            const enteredPin = document.getElementById('adminPassword').value;
            if(enteredPin === adminPIN) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('secureContent').style.display = 'block';
            } else {
                alert(langData[currentLang].alertWrongPin);
            }
        }

        function toggleAdminView() {
            const zone = document.getElementById('adminZone');
            const trigger = document.getElementById('btnAdminShow');
            if (zone.style.display === 'block') {
                zone.style.display = 'none';
                trigger.innerText = langData[currentLang].btnAdminShow;
            } else {
                zone.style.display = 'block';
                document.getElementById('authBox').style.display = 'flex';
                document.getElementById('secureContent').style.display = 'none';
                document.getElementById('adminPassword').value = '';
                trigger.innerText = langData[currentLang].btnAdminHide;
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.body.classList.toggle('rtl', currentLang === 'ar');
            document.body.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');

            document.getElementById('mainTitle').innerText = langData[currentLang].title;
            document.getElementById('mainDesc').innerText = langData[currentLang].desc;
            document.getElementById('lblName').innerText = langData[currentLang].lblName;
            document.getElementById('lblItem').innerText = langData[currentLang].lblItem;
            document.getElementById('userName').placeholder = langData[currentLang].placeholderName;
            document.getElementById('userItem').placeholder = langData[currentLang].placeholderItem;
            document.getElementById('btnSubmit').innerText = langData[currentLang].btnSubmit;
            document.getElementById('adminPassword').placeholder = langData[currentLang].pinPlaceholder;
            document.getElementById('btnVerify').innerText = langData[currentLang].btnVerify;
            document.getElementById('thName').innerText = langData[currentLang].thName;
            document.getElementById('thItem').innerText = langData[currentLang].thItem;
            document.getElementById('langBtn').innerText = langData[currentLang].langBtn;
            
            const isVisible = document.getElementById('adminZone').style.display === 'block';
            document.getElementById('btnAdminShow').innerText = isVisible ? langData[currentLang].btnAdminHide : langData[currentLang].btnAdminShow;
        }
    </script>
</body>
</html>
